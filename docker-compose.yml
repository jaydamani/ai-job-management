services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gappeo
      POSTGRES_PASSWORD: gappeo
      POSTGRES_DB: gappeo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gappeo"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/gappeo;
        mc anonymous set download local/gappeo;
        exit 0;
      "

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://gappeo:gappeo@postgres:5432/gappeo
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AI_MODEL: ${AI_MODEL:-gemini/gemini-flash-lite-latest}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: gappeo
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      CORS_ORIGINS: ""
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    expose:
      - "8000"

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  minio_data:
